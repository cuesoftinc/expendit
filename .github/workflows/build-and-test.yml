# CI — build & test on every push/PR (X-6: merge-to-main never deploys;
# release.yml is tag-gated and lands separately).
name: build-and-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web · lint + typecheck + unit + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

  web-e2e:
    name: web · Playwright (TEST_MODE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright, TEST_MODE)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_TEST_MODE: "1"
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
