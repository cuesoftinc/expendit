# build-and-test (EX-4, org canon): verify-only — X-6: merge-to-main never
# deploys; releases are tag-gated (release.yml, later unit).
name: build-and-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web · lint + typecheck + unit + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Jest legacy suite + Vitest)
        run: npm run test:ci

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

  web-e2e:
    name: web · Playwright (TEST_MODE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (TEST_MODE)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_TEST_MODE: "1"
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
