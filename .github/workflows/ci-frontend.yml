  #     name: github-pages
  #     url: ${{ steps.deployment.outputs.page_url }}
  #   runs-on: ubuntu-latest
  #   needs: frontend-pipeline
  #   if: github.ref == 'refs/heads/main' # Deploy only on main branch once PR is merged
