name: Frontend (web) Pipeline for build and deploy to GitHub pages

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Phase 1 : (Front End) Build, Lint, Test, and Stage for Pages

  frontend-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web # Front End Directory

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/web/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/web/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: ./web/package-lock.json

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Run Linter
        run: ${{ steps.detect-package-manager.outputs.runner }} next lint

      - name: Run Tests
        run: ${{ steps.detect-package-manager.outputs.manager }} test --if-present

      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build

      # Prepares the static build for deployment when merged into main
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out

  # Phase 2 : (Backend) Verify Docker Build

  backend-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Go Docker Build
        uses: docker/build-push-action@v6
        with:
          context: ./api/common # Backend Directory
          file: ./api/common/Dockerfile
          push: false # builds Backend container Only - No Push
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Phase 3: (Deployment) Deploys Frontend on Main Branch Merge

  deploy-frontend:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: frontend-pipeline
    if: github.ref == 'refs/heads/main' # Deploy only on main branch once PR is merged
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
