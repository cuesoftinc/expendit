services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    networks:
      - go-db

  expendit-backend:
    build: ./api/common
    ports:
      - "9000:9000"
    env_file:
      - ./api/common/.env
    depends_on:
      - mongo
    networks:
      - go-db
      - envoy-go
      - next-envoy

  expendit-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - expendit-backend
    restart: always
    networks:
      - next-envoy
      - envoy-go

networks:
  next-envoy:
  envoy-go:
  go-db: